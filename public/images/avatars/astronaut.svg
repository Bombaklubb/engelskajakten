<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Astronauten">
  <!-- Background - space -->
  <circle cx="64" cy="64" r="62" fill="#020617"/>
  <radialGradient id="ag" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#ag)"/>
  <!-- Stars -->
  <circle cx="15" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="35" cy="12" r="1" fill="white" opacity="0.7"/>
  <circle cx="95" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="110" cy="28" r="1" fill="white" opacity="0.6"/>
  <circle cx="18" cy="90" r="1" fill="white" opacity="0.7"/>
  <circle cx="108" cy="80" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="25" cy="110" r="1" fill="white" opacity="0.5"/>
  <circle cx="102" cy="108" r="1" fill="white" opacity="0.6"/>
  <!-- Earth in background -->
  <circle cx="100" cy="108" r="18" fill="#1d4ed8" opacity="0.3"/>
  <circle cx="100" cy="108" r="18" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
  <!-- Suit body -->
  <rect x="28" y="72" width="72" height="50" rx="20" fill="#e2e8f0"/>
  <!-- Suit details -->
  <rect x="28" y="72" width="72" height="50" rx="20" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <!-- Front panel -->
  <rect x="46" y="82" width="36" height="28" rx="6" fill="#cbd5e1"/>
  <!-- Buttons on panel -->
  <circle cx="56" cy="91" r="3" fill="#ef4444"/>
  <circle cx="64" cy="91" r="3" fill="#22c55e"/>
  <circle cx="72" cy="91" r="3" fill="#3b82f6"/>
  <rect x="52" y="99" width="24" height="6" rx="2" fill="#475569"/>
  <!-- Arms with gloves -->
  <rect x="8" y="68" width="24" height="38" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="96" y="68" width="24" height="38" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Gloves -->
  <ellipse cx="20" cy="107" rx="12" ry="8" fill="#475569"/>
  <ellipse cx="108" cy="107" rx="12" ry="8" fill="#475569"/>
  <!-- Helmet ring/collar -->
  <ellipse cx="64" cy="70" rx="28" ry="8" fill="#94a3b8"/>
  <!-- Helmet -->
  <ellipse cx="64" cy="46" rx="30" ry="32" fill="#e2e8f0"/>
  <ellipse cx="64" cy="46" rx="30" ry="32" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Visor -->
  <ellipse cx="64" cy="46" rx="22" ry="22" fill="#0f172a"/>
  <ellipse cx="64" cy="46" rx="22" ry="22" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Visor shine -->
  <ellipse cx="55" cy="36" rx="10" ry="8" fill="white" opacity="0.12"/>
  <!-- Face inside visor -->
  <ellipse cx="55" cy="46" rx="6" ry="5" fill="white" opacity="0.9"/>
  <ellipse cx="73" cy="46" rx="6" ry="5" fill="white" opacity="0.9"/>
  <circle cx="56" cy="47" r="4" fill="#60a5fa"/>
  <circle cx="74" cy="47" r="4" fill="#60a5fa"/>
  <circle cx="56" cy="47" r="2.5" fill="#111"/>
  <circle cx="74" cy="47" r="2.5" fill="#111"/>
  <circle cx="57" cy="45.5" r="1" fill="white"/>
  <circle cx="75" cy="45.5" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M57,56 Q64,62 71,56" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- NASA-style badge -->
  <circle cx="84" cy="38" r="8" fill="#1d4ed8"/>
  <text x="84" y="41" text-anchor="middle" font-size="6" fill="white" font-weight="bold">EJ</text>
  <!-- Antenna on helmet -->
  <line x1="64" y1="14" x2="64" y2="6" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="64" cy="5" r="3" fill="#ef4444"/>
</svg>
