<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Alven">
  <!-- Background – enchanted forest -->
  <circle cx="64" cy="64" r="62" fill="#14532d"/>
  <radialGradient id="ebg" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#4ade80" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#14532d" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#ebg)"/>
  <!-- Floating leaves/magic particles -->
  <ellipse cx="18" cy="28" rx="4" ry="2" fill="#4ade80" opacity="0.6" transform="rotate(-30 18 28)"/>
  <ellipse cx="108" cy="22" rx="3" ry="1.5" fill="#86efac" opacity="0.5" transform="rotate(20 108 22)"/>
  <ellipse cx="112" cy="90" rx="3" ry="1.5" fill="#4ade80" opacity="0.5" transform="rotate(-15 112 90)"/>
  <circle cx="20" cy="80" r="1.5" fill="#bbf7d0" opacity="0.7"/>
  <circle cx="108" cy="65" r="1" fill="#bbf7d0" opacity="0.6"/>
  <!-- Body (forest-green tunic) -->
  <path d="M32,128 Q36,88 52,78 Q58,75 64,75 Q70,75 76,78 Q92,88 96,128Z" fill="#15803d"/>
  <!-- Tunic detail -->
  <path d="M50,128 Q53,95 60,85 Q62,83 64,83 Q66,83 68,85 Q75,95 78,128Z" fill="#166534"/>
  <!-- Belt -->
  <rect x="44" y="89" width="40" height="7" rx="3" fill="#92400e"/>
  <rect x="58" y="87" width="12" height="11" rx="2" fill="#b45309"/>
  <!-- Belt buckle -->
  <rect x="60" y="89" width="8" height="7" rx="1" fill="#fbbf24"/>
  <!-- Leaf/vine decorations on tunic -->
  <path d="M44,95 Q50,88 56,93" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  <path d="M72,93 Q78,88 84,95" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
  <!-- Neck -->
  <rect x="57" y="62" width="14" height="16" rx="5" fill="#fde68a"/>
  <!-- Head -->
  <ellipse cx="64" cy="50" rx="23" ry="24" fill="#fde68a"/>
  <!-- Pointed hat -->
  <path d="M64,10 L82,34 Q72,30 64,32 Q56,30 46,34Z" fill="#15803d" stroke="#166534" stroke-width="1"/>
  <!-- Hat band -->
  <path d="M46,34 Q64,30 82,34" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <!-- Hat feather -->
  <path d="M80,30 Q90,16 84,8 Q78,18 74,28" fill="#ef4444" stroke="#dc2626" stroke-width="0.5"/>
  <!-- Pointy ears! -->
  <path d="M41,42 Q28,36 26,28 Q34,32 40,40Z" fill="#fde68a" stroke="#f0b888" stroke-width="1"/>
  <path d="M87,42 Q100,36 102,28 Q94,32 88,40Z" fill="#fde68a" stroke="#f0b888" stroke-width="1"/>
  <!-- Ear inner -->
  <path d="M41,42 Q32,36 30,30 Q36,33 41,41Z" fill="#f0b888"/>
  <path d="M87,42 Q96,36 98,30 Q92,33 87,41Z" fill="#f0b888"/>
  <!-- Hair (long, auburn) -->
  <path d="M42,28 Q38,40 38,56 Q44,52 46,44 Q44,36 44,28Z" fill="#b45309"/>
  <path d="M86,28 Q90,40 90,56 Q84,52 82,44 Q84,36 84,28Z" fill="#b45309"/>
  <ellipse cx="64" cy="28" rx="22" ry="12" fill="#b45309"/>
  <!-- Hair highlight -->
  <path d="M52,22 Q64,18 76,22" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Eyes (bright green, elvish) -->
  <ellipse cx="52" cy="48" rx="7" ry="6" fill="white"/>
  <ellipse cx="76" cy="48" rx="7" ry="6" fill="white"/>
  <circle cx="53" cy="49" r="4.5" fill="#16a34a"/>
  <circle cx="77" cy="49" r="4.5" fill="#16a34a"/>
  <circle cx="53" cy="49" r="2.5" fill="#111"/>
  <circle cx="77" cy="49" r="2.5" fill="#111"/>
  <circle cx="54.5" cy="47.5" r="1.5" fill="white"/>
  <circle cx="78.5" cy="47.5" r="1.5" fill="white"/>
  <!-- Eyebrows (arched) -->
  <path d="M46,41 Q52,37 58,40" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M70,40 Q76,37 82,41" stroke="#92400e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="64" cy="55" rx="3" ry="2" fill="#f0b888"/>
  <!-- Mouth (mischievous grin) -->
  <path d="M55,62 Q64,70 73,62" stroke="#b45309" stroke-width="2" fill="#fda4af" stroke-linecap="round"/>
  <!-- Magic bow (arms) -->
  <ellipse cx="32" cy="90" rx="14" ry="9" fill="#15803d"/>
  <ellipse cx="96" cy="90" rx="14" ry="9" fill="#15803d"/>
  <ellipse cx="25" cy="97" rx="10" ry="8" fill="#fde68a"/>
  <ellipse cx="103" cy="97" rx="10" ry="8" fill="#fde68a"/>
  <!-- Arrow/bow in hand -->
  <path d="M14,80 Q20,95 18,110" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M14,80 Q8,88 10,100" stroke="#92400e" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <line x1="12" y1="80" x2="20" y2="80" stroke="#92400e" stroke-width="1.5"/>
</svg>
