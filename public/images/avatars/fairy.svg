  <circle cx="60" cy="28" r="2" fill="#fde68a"/>
  <circle cx="68" cy="28" r="2" fill="#fde68a"/>
  <circle cx="76" cy="32" r="2" fill="#fde68a"/>
  <circle cx="64" cy="26" r="2" fill="#fde68a"/>
