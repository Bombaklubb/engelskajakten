  <path d="M42,36 Q38,48 38,58 Q44,54 46,46 Q44,40 42,36Z" fill="#fbbf24"/>
  <path d="M86,36 Q90,48 90,58 Q84,54 82,46 Q84,40 86,36Z" fill="#fbbf24"/>
  <ellipse cx="64" cy="34" rx="22" ry="10" fill="#fbbf24"/>
  <!-- Eyes (big sparkly) -->
  <ellipse cx="52" cy="50" rx="7.5" ry="7" fill="white"/>
  <ellipse cx="76" cy="50" rx="7.5" ry="7" fill="white"/>
  <circle cx="52" cy="50" r="5.5" fill="#a855f7"/>
  <circle cx="76" cy="50" r="5.5" fill="#a855f7"/>
  <circle cx="52" cy="50" r="3" fill="#111"/>
