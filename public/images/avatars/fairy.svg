  <path d="M45,44 Q50,40 56,44" stroke="#111" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M72,44 Q78,40 84,44" stroke="#111" stroke-width="1.2" fill="none" stroke-linecap="round"/>
