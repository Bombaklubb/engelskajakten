<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Fotbollsspelaren">
  <!-- Background – stadium green -->
  <circle cx="64" cy="64" r="62" fill="#14532d"/>
  <radialGradient id="fbbg2" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#4ade80" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#14532d" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#fbbg2)"/>
  <!-- Stadium grass lines -->
  <line x1="0" y1="105" x2="128" y2="105" stroke="#166534" stroke-width="2" opacity="0.5"/>
  <ellipse cx="64" cy="115" rx="40" ry="8" fill="#166534" opacity="0.4"/>
  <!-- Football/soccer ball -->
  <circle cx="28" cy="108" r="14" fill="white" stroke="#111" stroke-width="1.5"/>
  <!-- Ball pentagon pattern -->
  <polygon points="28,96 22,100 22,108 28,112 34,108 34,100" fill="#111" opacity="0.8" transform="scale(0.5) translate(28,100)"/>
  <path d="M18,100 Q28,95 38,100" fill="none" stroke="#111" stroke-width="1" opacity="0.6"/>
  <path d="M16,108 Q28,114 40,108" fill="none" stroke="#111" stroke-width="1" opacity="0.6"/>
  <!-- Body (football kit) -->
  <path d="M36,128 Q40,88 54,78 Q59,75 64,75 Q69,75 74,78 Q88,88 92,128Z" fill="#dc2626"/>
  <!-- Kit stripes -->
  <path d="M54,78 Q64,74 74,78 L72,128 Q64,124 56,128Z" fill="#fff" opacity="0.15"/>
  <!-- Kit number -->
  <text x="64" y="104" text-anchor="middle" font-size="18" font-weight="900" fill="white" font-family="sans-serif" opacity="0.9">10</text>
  <!-- Shorts -->
  <path d="M46,104 Q50,116 56,128 L72,128 Q78,116 82,104Z" fill="#1c1917"/>
  <line x1="64" y1="104" x2="64" y2="128" stroke="#374151" stroke-width="1.5"/>
  <!-- Kit badge/crest -->
  <circle cx="54" cy="82" r="5" fill="#fbbf24"/>
  <polygon points="54,78 55.5,82 54,86 52.5,82" fill="#dc2626"/>
  <!-- Arms (athletic) -->
  <rect x="14" y="78" width="22" height="30" rx="8" fill="#dc2626"/>
  <rect x="92" y="78" width="22" height="30" rx="8" fill="#dc2626"/>
  <!-- Wristbands -->
  <rect x="14" y="100" width="22" height="5" rx="2" fill="white" opacity="0.5"/>
  <rect x="92" y="100" width="22" height="5" rx="2" fill="white" opacity="0.5"/>
  <ellipse cx="25" cy="108" rx="11" ry="8" fill="#fcd34d"/>
  <ellipse cx="103" cy="108" rx="11" ry="8" fill="#fcd34d"/>
  <!-- Neck -->
  <rect x="57" y="62" width="14" height="16" rx="6" fill="#fcd34d"/>
  <!-- Head -->
  <ellipse cx="64" cy="50" rx="24" ry="26" fill="#fcd34d"/>
  <!-- Short athletic hair -->
  <path d="M40,38 Q64,28 88,38 L86,44 Q72,36 64,38 Q56,36 42,44Z" fill="#92400e"/>
  <path d="M40,35 Q36,26 38,20 Q42,24 42,36Z" fill="#92400e"/>
  <path d="M88,35 Q92,26 90,20 Q86,24 86,36Z" fill="#92400e"/>
  <!-- Headband (football) -->
  <rect x="40" y="38" width="48" height="6" rx="3" fill="white" opacity="0.9"/>
  <line x1="64" y1="38" x2="64" y2="44" stroke="#dc2626" stroke-width="2"/>
  <!-- Eyes (determined, focused) -->
  <ellipse cx="52" cy="48" rx="7" ry="6.5" fill="white"/>
  <ellipse cx="76" cy="48" rx="7" ry="6.5" fill="white"/>
  <circle cx="52" cy="49" r="5" fill="#1e3a8a"/>
  <circle cx="76" cy="49" r="5" fill="#1e3a8a"/>
  <circle cx="52" cy="49" r="2.5" fill="#111"/>
  <circle cx="76" cy="49" r="2.5" fill="#111"/>
  <circle cx="53.5" cy="47.5" r="1.5" fill="white"/>
  <circle cx="77.5" cy="47.5" r="1.5" fill="white"/>
  <!-- Determined eyebrows -->
  <path d="M46,41 L58,41" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M70,41 L82,41" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="64" cy="55" rx="4" ry="3" fill="#f0b888"/>
  <!-- Confident game face -->
  <path d="M55,62 Q64,70 73,62" stroke="#b45309" stroke-width="2.5" fill="#fda4af" stroke-linecap="round"/>
  <!-- Cheek blush (exertion) -->
  <ellipse cx="44" cy="56" rx="6" ry="4" fill="#fca5a5" opacity="0.3"/>
  <ellipse cx="84" cy="56" rx="6" ry="4" fill="#fca5a5" opacity="0.3"/>
  <!-- Shin guards -->
  <rect x="46" y="116" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
  <rect x="70" y="116" width="12" height="12" rx="3" fill="white" opacity="0.6"/>
  <!-- Boot cleats -->
  <rect x="44" y="124" width="16" height="4" rx="2" fill="#1c1917"/>
  <rect x="68" y="124" width="16" height="4" rx="2" fill="#1c1917"/>
</svg>
