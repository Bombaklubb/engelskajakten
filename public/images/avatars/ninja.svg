<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Ninja">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="#1a1a2e"/>
  <circle cx="64" cy="64" r="62" fill="none" stroke="#4a0080" stroke-width="3"/>
  <!-- Glow effect -->
  <radialGradient id="ng" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#6600cc" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="55" r="45" fill="url(#ng)"/>
  <!-- Body/suit -->
  <rect x="40" y="78" width="48" height="38" rx="8" fill="#111"/>
  <!-- Belt -->
  <rect x="40" y="91" width="48" height="7" rx="2" fill="#cc0000"/>
  <rect x="58" y="89" width="12" height="11" rx="2" fill="#ff3333"/>
  <!-- Arms -->
  <rect x="20" y="76" width="22" height="12" rx="6" fill="#111"/>
  <rect x="86" y="76" width="22" height="12" rx="6" fill="#111"/>
  <!-- Hands -->
  <circle cx="20" cy="82" r="7" fill="#ffc87a"/>
  <circle cx="108" cy="82" r="7" fill="#ffc87a"/>
  <!-- Neck/Head base -->
  <rect x="54" y="62" width="20" height="18" rx="4" fill="#111"/>
  <!-- Head -->
  <ellipse cx="64" cy="52" rx="24" ry="26" fill="#ffc87a"/>
  <!-- Mask – top -->
  <path d="M40,42 Q64,28 88,42 Q88,34 64,30 Q40,34 40,42Z" fill="#111"/>
  <!-- Mask – lower half -->
  <rect x="40" y="55" width="48" height="20" rx="8" fill="#111"/>
  <!-- Eyes visible between mask pieces -->
  <ellipse cx="54" cy="52" rx="7" ry="5" fill="white"/>
  <ellipse cx="74" cy="52" rx="7" ry="5" fill="white"/>
  <circle cx="55" cy="53" r="4" fill="#1a1a2e"/>
  <circle cx="75" cy="53" r="4" fill="#1a1a2e"/>
  <circle cx="56" cy="51" r="1.5" fill="white"/>
  <circle cx="76" cy="51" r="1.5" fill="white"/>
  <!-- Headband -->
  <rect x="39" y="42" width="50" height="8" rx="3" fill="#cc0000"/>
  <!-- Headband knot -->
  <path d="M85,46 Q95,40 102,46 Q95,52 85,46Z" fill="#cc0000"/>
  <!-- Stars decoration -->
  <polygon points="18,20 20,15 22,20 27,20 23,23 25,28 20,25 15,28 17,23 13,20" fill="#FFD700" opacity="0.8"/>
  <polygon points="105,15 107,10 109,15 114,15 110,18 112,23 107,20 102,23 104,18 100,15" fill="#FFD700" opacity="0.6"/>
</svg>
