<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Piraten">
  <!-- Background – ocean -->
  <circle cx="64" cy="64" r="62" fill="#0c4a6e"/>
  <radialGradient id="pg" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#pg)"/>
  <!-- Waves in background -->
  <path d="M0,90 Q20,82 40,90 Q60,98 80,90 Q100,82 120,90 L128,90 L128,128 L0,128Z" fill="#075985" opacity="0.5"/>
  <path d="M0,100 Q25,92 50,100 Q75,108 100,100 Q112,96 128,100 L128,128 L0,128Z" fill="#0369a1" opacity="0.4"/>
  <!-- Body/coat (dark) -->
  <rect x="30" y="72" width="68" height="52" rx="8" fill="#1c1917"/>
  <!-- Coat lapels -->
  <path d="M64,72 L50,82 L44,112 L64,112Z" fill="#292524"/>
  <path d="M64,72 L78,82 L84,112 L64,112Z" fill="#292524"/>
  <!-- Coat buttons -->
  <circle cx="64" cy="86" r="3" fill="#fbbf24"/>
  <circle cx="64" cy="96" r="3" fill="#fbbf24"/>
  <circle cx="64" cy="106" r="3" fill="#fbbf24"/>
  <!-- Belt -->
  <rect x="30" y="90" width="68" height="8" rx="3" fill="#78350f"/>
  <rect x="56" y="88" width="16" height="12" rx="2" fill="#fbbf24"/>
  <text x="64" y="97" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">⚓</text>
  <!-- Arms -->
  <rect x="8" y="68" width="24" height="32" rx="10" fill="#1c1917"/>
  <rect x="96" y="68" width="24" height="32" rx="10" fill="#1c1917"/>
  <!-- Hook (left arm) -->
  <circle cx="18" cy="100" r="6" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
  <path d="M14,104 Q8,112 10,118 Q14,124 20,118" stroke="#9ca3af" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hand (right arm) -->
  <ellipse cx="110" cy="100" rx="9" ry="7" fill="#fbbf24"/>
  <!-- Neck -->
  <rect x="55" y="60" width="18" height="16" rx="6" fill="#fbbf24"/>
  <!-- Head -->
  <ellipse cx="64" cy="48" rx="24" ry="26" fill="#fbbf24"/>
  <!-- Hat -->
  <ellipse cx="64" cy="26" rx="30" ry="7" fill="#1c1917"/>
  <rect x="36" y="8" width="56" height="22" rx="4" fill="#1c1917"/>
  <!-- Skull and crossbones on hat -->
  <circle cx="64" cy="16" r="7" fill="white"/>
  <circle cx="61" cy="14" r="2" fill="#1c1917"/>
  <circle cx="67" cy="14" r="2" fill="#1c1917"/>
  <path d="M60,19 Q64,23 68,19" stroke="#1c1917" stroke-width="1.5" fill="none"/>
  <line x1="55" y1="22" x2="61" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="22" x2="67" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="16" x2="61" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="16" x2="67" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Eyepatch -->
  <ellipse cx="52" cy="46" rx="10" ry="8" fill="#111"/>
  <path d="M42,42 Q52,38 62,42" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Good eye -->
  <ellipse cx="76" cy="46" rx="7" ry="6" fill="white"/>
  <circle cx="77" cy="47" r="4.5" fill="#92400e"/>
  <circle cx="77" cy="47" r="2.5" fill="#111"/>
  <circle cx="78.5" cy="45.5" r="1" fill="white"/>
  <!-- Scar across eyepatch -->
  <path d="M46,38 L58,54" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Nose -->
  <ellipse cx="68" cy="54" rx="4" ry="3" fill="#f0b888"/>
  <!-- Beard/stubble -->
  <path d="M52,60 Q64,72 76,60 Q72,75 64,78 Q56,75 52,60Z" fill="#44403c"/>
  <!-- Mouth/smirk -->
  <path d="M58,62 Q68,70 74,64" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Earring -->
  <circle cx="40" cy="52" r="3" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="40" cy="56" r="2" fill="#fbbf24"/>
</svg>
