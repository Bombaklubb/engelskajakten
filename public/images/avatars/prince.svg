<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Prinsen">
  <!-- Background -->
  <circle cx="64" cy="64" r="62" fill="#1e3a8a"/>
  <radialGradient id="prbg" cx="50%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#prbg)"/>
  <!-- Stars -->
  <circle cx="18" cy="20" r="1.5" fill="#fde68a" opacity="0.8"/>
  <circle cx="110" cy="16" r="1.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="14" cy="88" r="1" fill="#fde68a" opacity="0.6"/>
  <path d="M108,40 L110,35 L112,40 L117,42 L112,44 L110,49 L108,44 L103,42Z" fill="#fde68a" opacity="0.7"/>
  <!-- Royal cape/body -->
  <path d="M26,128 Q30,90 50,80 Q57,77 64,77 Q71,77 78,80 Q98,90 102,128Z" fill="#1d4ed8"/>
  <!-- Cape pattern -->
  <path d="M36,128 Q40,95 56,86 Q60,84 64,84 Q68,84 72,86 Q88,95 92,128Z" fill="#2563eb"/>
  <!-- Gold trim on cape -->
  <path d="M36,128 Q40,95 56,86" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <path d="M92,128 Q88,95 72,86" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <!-- Ermine collar/fur trim -->
  <path d="M44,80 Q64,74 84,80 L84,88 Q64,82 44,88Z" fill="white"/>
  <!-- Ermine spots -->
  <circle cx="50" cy="84" r="2" fill="#374151"/>
  <circle cx="64" cy="83" r="2" fill="#374151"/>
  <circle cx="78" cy="84" r="2" fill="#374151"/>
  <!-- Medal/brooch -->
  <circle cx="64" cy="92" r="5" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <path d="M64,88 L65.5,92 L64,96 L62.5,92Z" fill="#d97706"/>
  <!-- Neck -->
  <rect x="57" y="62" width="14" height="18" rx="6" fill="#fbbf24"/>
  <!-- Head -->
  <ellipse cx="64" cy="48" rx="24" ry="25" fill="#fbbf24"/>
  <!-- Hair (short, dark) -->
  <ellipse cx="64" cy="28" rx="24" ry="14" fill="#92400e"/>
  <path d="M40,32 Q38,42 40,48 Q46,44 46,38Z" fill="#92400e"/>
  <path d="M88,32 Q90,42 88,48 Q82,44 82,38Z" fill="#92400e"/>
  <!-- Hair highlight -->
  <path d="M50,24 Q64,20 78,24" fill="none" stroke="#b45309" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- Crown -->
  <path d="M42,32 L46,20 L52,30 L64,16 L76,30 L82,20 L86,32Z" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
  <!-- Crown gems -->
  <circle cx="64" cy="19" r="5" fill="#3b82f6"/>
  <circle cx="52" cy="28" r="3.5" fill="#ef4444"/>
  <circle cx="76" cy="28" r="3.5" fill="#22c55e"/>
  <circle cx="46" cy="23" r="2.5" fill="#a78bfa"/>
  <circle cx="82" cy="23" r="2.5" fill="#f59e0b"/>
  <!-- Crown band -->
  <rect x="42" y="31" width="44" height="6" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="47" rx="7" ry="6.5" fill="white"/>
  <ellipse cx="76" cy="47" rx="7" ry="6.5" fill="white"/>
  <circle cx="53" cy="48" r="5" fill="#1d4ed8"/>
  <circle cx="77" cy="48" r="5" fill="#1d4ed8"/>
  <circle cx="53" cy="48" r="2.5" fill="#111"/>
  <circle cx="77" cy="48" r="2.5" fill="#111"/>
  <circle cx="54.5" cy="46.5" r="1.5" fill="white"/>
  <circle cx="78.5" cy="46.5" r="1.5" fill="white"/>
  <!-- Eyebrows (bold, princely) -->
  <path d="M46,40 Q52,36 58,39" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,39 Q76,36 82,40" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="64" cy="54" rx="3.5" ry="2.5" fill="#f0b888"/>
  <!-- Mouth (confident smile) -->
  <path d="M56,62 Q64,69 72,62" stroke="#b45309" stroke-width="2.5" fill="#fda4af" stroke-linecap="round"/>
  <!-- Sword hilt (side) -->
  <rect x="90" y="88" width="4" height="28" rx="2" fill="#9ca3af"/>
  <rect x="86" y="91" width="12" height="4" rx="2" fill="#fbbf24"/>
  <circle cx="92" cy="88" r="3" fill="#fbbf24"/>
  <!-- Arms -->
  <ellipse cx="34" cy="90" rx="12" ry="9" fill="#1d4ed8"/>
  <ellipse cx="94" cy="90" rx="12" ry="9" fill="#1d4ed8"/>
  <ellipse cx="27" cy="97" rx="9" ry="7" fill="#fbbf24"/>
  <ellipse cx="101" cy="97" rx="9" ry="7" fill="#fbbf24"/>
</svg>
