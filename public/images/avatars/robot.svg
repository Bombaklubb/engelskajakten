<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Roboten">
  <!-- Background -->
  <circle cx="64" cy="64" r="62" fill="#0f172a"/>
  <radialGradient id="rg" cx="50%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#rg)"/>
  <!-- Grid lines background -->
  <line x1="0" y1="32" x2="128" y2="32" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="64" x2="128" y2="64" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="96" x2="128" y2="96" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <line x1="32" y1="0" x2="32" y2="128" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <line x1="96" y1="0" x2="96" y2="128" stroke="#0ea5e9" stroke-width="0.3" opacity="0.2"/>
  <!-- Body -->
  <rect x="30" y="72" width="68" height="50" rx="8" fill="#1e293b"/>
  <rect x="30" y="72" width="68" height="50" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Chest display -->
  <rect x="40" y="82" width="48" height="28" rx="4" fill="#0c1628"/>
  <rect x="40" y="82" width="48" height="28" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Heart/energy display on chest -->
  <text x="64" y="102" text-anchor="middle" font-size="18" fill="#0ea5e9" opacity="0.9">♥</text>
  <!-- Power light -->
  <circle cx="64" cy="110" r="4" fill="#22c55e"/>
  <circle cx="64" cy="110" r="2" fill="#86efac"/>
  <!-- Arms -->
  <rect x="10" y="70" width="20" height="42" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.2"/>
  <rect x="98" y="70" width="20" height="42" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.2"/>
  <!-- Hands (claws) -->
  <rect x="10" y="110" width="20" height="10" rx="5" fill="#334155"/>
  <rect x="98" y="110" width="20" height="10" rx="5" fill="#334155"/>
  <!-- Antenna -->
  <rect x="62" y="18" width="4" height="16" rx="2" fill="#94a3b8"/>
  <circle cx="64" cy="16" r="5" fill="#0ea5e9"/>
  <circle cx="64" cy="16" r="3" fill="#38bdf8"/>
  <!-- Head -->
  <rect x="34" y="34" width="60" height="40" rx="10" fill="#1e293b"/>
  <rect x="34" y="34" width="60" height="40" rx="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <!-- Eye panels -->
  <rect x="42" y="44" width="20" height="14" rx="4" fill="#0c1628"/>
  <rect x="42" y="44" width="20" height="14" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1"/>
  <rect x="66" y="44" width="20" height="14" rx="4" fill="#0c1628"/>
  <rect x="66" y="44" width="20" height="14" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1"/>
  <!-- Eyes (LEDs) -->
  <ellipse cx="52" cy="51" rx="6" ry="4" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="76" cy="51" rx="6" ry="4" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="52" cy="51" rx="3" ry="2" fill="white"/>
  <ellipse cx="76" cy="51" rx="3" ry="2" fill="white"/>
  <!-- Mouth display -->
  <rect x="46" y="62" width="36" height="7" rx="3" fill="#0c1628" stroke="#0ea5e9" stroke-width="0.8"/>
  <rect x="48" y="63.5" width="8" height="4" rx="1" fill="#0ea5e9" opacity="0.8"/>
  <rect x="58" y="63.5" width="8" height="4" rx="1" fill="#0ea5e9" opacity="0.5"/>
  <rect x="68" y="63.5" width="8" height="4" rx="1" fill="#0ea5e9" opacity="0.8"/>
  <!-- Side bolts -->
  <circle cx="36" cy="54" r="3" fill="#334155" stroke="#0ea5e9" stroke-width="0.8"/>
  <circle cx="92" cy="54" r="3" fill="#334155" stroke="#0ea5e9" stroke-width="0.8"/>
  <!-- Neck -->
  <rect x="55" y="73" width="18" height="6" rx="3" fill="#334155"/>
</svg>
