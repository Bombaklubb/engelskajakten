<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Vampyren">
  <!-- Background – moonlit night -->
  <circle cx="64" cy="64" r="62" fill="#1e1b4b"/>
  <radialGradient id="vabg" cx="50%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
  </radialGradient>
  <circle cx="64" cy="64" r="62" fill="url(#vabg)"/>
  <!-- Moon -->
  <circle cx="96" cy="18" r="14" fill="#e2e8f0" opacity="0.9"/>
  <circle cx="101" cy="14" r="12" fill="#1e1b4b"/>
  <!-- Stars -->
  <circle cx="16" cy="18" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="30" cy="10" r="1" fill="white" opacity="0.6"/>
  <circle cx="108" cy="45" r="1" fill="white" opacity="0.7"/>
  <circle cx="12" cy="55" r="1.5" fill="white" opacity="0.5"/>
  <!-- Bat silhouette -->
  <path d="M100,50 Q106,44 112,48 Q108,52 104,50 Q108,56 104,58 Q100,54 100,50Z" fill="#312e81" opacity="0.7"/>
  <path d="M100,50 Q94,44 88,48 Q92,52 96,50 Q92,56 96,58 Q100,54 100,50Z" fill="#312e81" opacity="0.7"/>
  <circle cx="100" cy="50" r="2" fill="#312e81" opacity="0.7"/>
  <!-- Vampire cape -->
  <path d="M40,70 Q12,82 8,118 Q28,112 50,98 Q58,92 62,82Z" fill="#1c1917"/>
  <path d="M88,70 Q116,82 120,118 Q100,112 78,98 Q70,92 66,82Z" fill="#1c1917"/>
  <!-- Cape red lining -->
  <path d="M42,72 Q18,84 14,114 Q32,108 52,96Z" fill="#dc2626"/>
  <path d="M86,72 Q110,84 114,114 Q96,108 76,96Z" fill="#dc2626"/>
  <!-- Body (black suit) -->
  <path d="M38,128 Q42,88 54,78 Q59,75 64,75 Q69,75 74,78 Q86,88 90,128Z" fill="#1c1917"/>
  <!-- White shirt front -->
  <path d="M56,78 Q64,74 72,78 L70,100 Q64,96 58,100Z" fill="#f8fafc"/>
  <!-- Bow tie -->
  <polygon points="58,80 64,84 70,80 64,76" fill="#dc2626"/>
  <!-- Buttons -->
  <circle cx="64" cy="87" r="1.5" fill="#1c1917"/>
  <circle cx="64" cy="93" r="1.5" fill="#1c1917"/>
  <!-- Arms -->
  <rect x="14" y="70" width="22" height="30" rx="8" fill="#1c1917"/>
  <rect x="92" y="70" width="22" height="30" rx="8" fill="#1c1917"/>
  <ellipse cx="25" cy="100" rx="11" ry="8" fill="#f1f5f9"/>
  <ellipse cx="103" cy="100" rx="11" ry="8" fill="#f1f5f9"/>
  <!-- Neck (pale) -->
  <rect x="57" y="62" width="14" height="16" rx="5" fill="#e2e8f0"/>
  <!-- Bite marks -->
  <circle cx="60" cy="70" r="2" fill="#dc2626"/>
  <circle cx="68" cy="70" r="2" fill="#dc2626"/>
  <!-- Head (pale) -->
  <ellipse cx="64" cy="50" rx="24" ry="26" fill="#e2e8f0"/>
  <!-- Slicked-back dark hair with widow's peak -->
  <path d="M42,34 Q64,24 86,34 L84,40 Q72,34 64,36 Q56,34 44,40Z" fill="#1c1917"/>
  <path d="M40,35 Q36,24 40,18 Q44,22 44,35Z" fill="#1c1917"/>
  <path d="M88,35 Q92,24 88,18 Q84,22 84,35Z" fill="#1c1917"/>
  <!-- Widow's peak -->
  <path d="M56,36 Q64,40 72,36 Q68,32 64,34 Q60,32 56,36Z" fill="#1c1917"/>
  <!-- Eyes (hypnotic red) -->
  <ellipse cx="52" cy="47" rx="7.5" ry="7" fill="#fef2f2"/>
  <ellipse cx="76" cy="47" rx="7.5" ry="7" fill="#fef2f2"/>
  <circle cx="52" cy="47" r="5.5" fill="#dc2626"/>
  <circle cx="76" cy="47" r="5.5" fill="#dc2626"/>
  <circle cx="52" cy="47" r="3" fill="#111"/>
  <circle cx="76" cy="47" r="3" fill="#111"/>
  <circle cx="53.5" cy="45.5" r="1.5" fill="#fca5a5" opacity="0.8"/>
  <circle cx="77.5" cy="45.5" r="1.5" fill="#fca5a5" opacity="0.8"/>
  <!-- Eyebrows (arched) -->
  <path d="M45,40 Q52,35 58,39" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,39 Q76,35 83,40" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="64" cy="54" rx="3" ry="2.5" fill="#d1d5db"/>
  <!-- Menacing smile with FANGS -->
  <path d="M52,62 Q64,72 76,62" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Fangs -->
  <polygon points="58,62 56,70 60,70" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <polygon points="70,62 68,70 72,70" fill="white" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Blood drop -->
  <path d="M60,70 Q60,73 62,74 Q64,73 64,70" fill="#dc2626"/>
</svg>
