<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Läs-mästare">
  <defs>
    <radialGradient id="rbg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M40,8 L68,20 L68,42 Q68,62 40,72 Q12,62 12,42 L12,20 Z" fill="url(#rbg)" stroke="#1e40af" stroke-width="1.5"/>
  <!-- Shield shine -->
  <path d="M40,14 L60,24 L60,40 Q56,50 40,58" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Open book icon -->
  <rect x="24" y="28" width="14" height="20" rx="2" fill="white" opacity="0.9"/>
  <rect x="42" y="28" width="14" height="20" rx="2" fill="white" opacity="0.9"/>
  <!-- Book spine -->
  <rect x="38" y="27" width="4" height="22" rx="1" fill="#3b82f6"/>
  <!-- Book lines -->
  <line x1="27" y1="33" x2="35" y2="33" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="27" y1="37" x2="35" y2="37" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="27" y1="41" x2="35" y2="41" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="45" y1="33" x2="53" y2="33" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="45" y1="37" x2="53" y2="37" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="45" y1="41" x2="53" y2="41" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Stars at top -->
  <circle cx="40" cy="18" r="3" fill="#fbbf24"/>
  <circle cx="32" cy="20" r="2" fill="#fbbf24" opacity="0.7"/>
  <circle cx="48" cy="20" r="2" fill="#fbbf24" opacity="0.7"/>
</svg>
